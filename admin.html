<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTFF · Admin Dashboard</title>
    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Chart.js for beautiful analytics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        :root {
            --primary: #2f6bc6;
            --primary-dark: #1e4a8c;
            --secondary: #1c2a3f;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --dark: #0a0f1a;
            --darker: #05080f;
            --light: #f3f4f6;
            --gray: #6b7280;
            --gradient: linear-gradient(135deg, #2f6bc6, #1e4a8c);
        }

        body {
            background-color: var(--dark);
            color: #fff;
            display: flex;
            overflow-x: hidden;
        }

        .enter-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--dark);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }

        .enter-box {
            background: var(--darker);
            border-radius: 30px;
            padding: 60px;
            width: 450px;
            max-width: 90vw;
            border: 2px solid var(--primary);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            text-align: center;
        }

        .enter-logo {
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #aaccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .enter-sub {
            color: var(--gray);
            margin-bottom: 40px;
            font-size: 1.1rem;
        }

        .enter-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 20px 50px;
            border-radius: 50px;
            font-size: 1.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 10px 20px rgba(47, 107, 198, 0.3);
            width: 100%;
        }

        .enter-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(47, 107, 198, 0.4);
        }

        .enter-btn i {
            margin-right: 10px;
        }

        .sidebar {
            width: 280px;
            background: var(--darker);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            border-right: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s;
            overflow-y: auto;
            z-index: 50;
        }

        .sidebar-header {
            padding: 30px 24px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .sidebar-header .logo {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #aaccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .sidebar-header .sub {
            color: var(--gray);
            font-size: 0.85rem;
        }

        .sidebar-nav {
            padding: 20px 0;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 24px;
            color: #b0c7e9;
            cursor: pointer;
            transition: all 0.2s;
            margin: 4px 8px;
            border-radius: 12px;
        }

        .nav-item i {
            width: 24px;
            font-size: 1.2rem;
        }

        .nav-item:hover {
            background: rgba(47, 107, 198, 0.1);
            color: white;
        }

        .nav-item.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 10px 20px -5px rgba(47, 107, 198, 0.3);
        }

        .nav-divider {
            height: 1px;
            background: rgba(255,255,255,0.05);
            margin: 20px 24px;
        }

        .nav-section-title {
            padding: 10px 24px;
            color: var(--gray);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .main-content {
            flex: 1;
            margin-left: 280px;
            min-height: 100vh;
            background: var(--dark);
            padding: 30px 40px;
        }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            background: var(--darker);
            padding: 15px 30px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .page-title h1 {
            font-size: 1.8rem;
            font-weight: 600;
            background: linear-gradient(to right, #fff, #b0c7e9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .page-title p {
            color: var(--gray);
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .admin-profile {
            display: flex;
            align-items: center;
            gap: 20px;
            cursor: pointer;
        }

        .admin-avatar {
            width: 50px;
            height: 50px;
            background: var(--gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            border: 2px solid var(--primary);
        }

        .admin-info h4 {
            font-size: 1rem;
            font-weight: 600;
        }

        .admin-info p {
            font-size: 0.8rem;
            color: var(--gray);
        }

        .global-loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 15, 26, 0.95);
            backdrop-filter: blur(5px);
            z-index: 20000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .global-loading-overlay.active {
            display: flex;
        }

        .global-loading-spinner {
            width: 80px;
            height: 80px;
            border: 5px solid rgba(47, 107, 198, 0.2);
            border-top: 5px solid #2f6bc6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--darker);
            border-radius: 24px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.2s;
            position: relative;
            overflow: hidden;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .stat-icon {
            width: 50px;
            height: 50px;
            background: rgba(47, 107, 198, 0.1);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            color: var(--primary);
            font-size: 1.5rem;
        }

        .stat-value {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-label {
            color: var(--gray);
            font-size: 0.9rem;
        }

        .charts-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .chart-card {
            background: var(--darker);
            border-radius: 24px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .chart-header h3 {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .chart-container {
            height: 300px;
            position: relative;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .section-header h2 {
            font-size: 1.4rem;
            font-weight: 600;
        }

        .btn-primary, .btn-secondary, .btn-success, .btn-warning, .btn-info, .btn-danger {
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: scale(1.02);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-warning {
            background: var(--warning);
            color: white;
        }

        .table-container {
            background: var(--darker);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            overflow-x: auto;
            margin-bottom: 40px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        th {
            text-align: left;
            padding: 15px 10px;
            color: var(--gray);
            font-weight: 500;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        td {
            padding: 15px 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        tr:hover {
            background: rgba(255,255,255,0.02);
        }

        .status-badge {
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-block;
        }

        .status-badge.active {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        .status-badge.pending {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
        }

        .action-btns {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            width: 35px;
            height: 35px;
            border-radius: 10px;
            background: var(--dark);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .action-btn:hover {
            background: var(--primary);
            border-color: var(--primary);
        }

        .action-btn.delete:hover {
            background: var(--danger);
            border-color: var(--danger);
        }

        .action-btn.success:hover {
            background: var(--success);
            border-color: var(--success);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            overflow-y: auto;
            padding: 30px 0;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--darker);
            border-radius: 30px;
            padding: 40px;
            width: 500px;
            max-width: 90vw;
            border: 2px solid var(--primary);
            position: relative;
            margin: auto;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 2rem;
            cursor: pointer;
            color: var(--gray);
            transition: color 0.2s;
        }

        .modal-close:hover {
            color: var(--danger);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--gray);
            font-size: 0.9rem;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            background: var(--dark);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: var(--primary);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .modal-buttons button {
            flex: 1;
        }

        .notification {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--primary);
            padding: 15px 25px;
            border-radius: 12px;
            color: white;
            font-weight: 500;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transform: translateX(120%);
            transition: transform 0.3s;
            z-index: 2000;
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification.error {
            background: var(--danger);
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 80px;
            }
            .sidebar .logo, .sidebar .sub, .nav-item span, .nav-section-title {
                display: none;
            }
            .main-content {
                margin-left: 80px;
                padding: 20px;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .charts-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="enter-container" id="enterContainer">
        <div class="enter-box">
            <div class="enter-logo">BTFF</div>
            <div class="enter-sub">admin dashboard</div>
            <button class="enter-btn" onclick="enterDashboard()">
                <i class="fas fa-sign-in-alt"></i> Enter Dashboard
            </button>
        </div>
    </div>

    <div class="sidebar" id="sidebar" style="display: none;">
        <div class="sidebar-header">
            <div class="logo">BTFF</div>
            <div class="sub">admin dashboard</div>
        </div>
        <div class="sidebar-nav">
            <div class="nav-item active" data-view="dashboard">
                <i class="fas fa-chart-pie"></i>
                <span>Dashboard</span>
            </div>
            <div class="nav-section-title">CONTENT</div>
            <div class="nav-item" data-view="movies">
                <i class="fas fa-film"></i>
                <span>Movies</span>
            </div>
            <div class="nav-item" data-view="series">
                <i class="fas fa-tv"></i>
                <span>Series</span>
            </div>
            <div class="nav-section-title">CALL CENTER</div>
            <div class="nav-item" data-view="callcenter-workers">
                <i class="fas fa-users"></i>
                <span>Workers</span>
            </div>
            <div class="nav-item" data-view="callcenter-clients">
                <i class="fas fa-address-book"></i>
                <span>Clients</span>
            </div>
            <div class="nav-item" data-view="callcenter-calls">
                <i class="fas fa-phone-alt"></i>
                <span>Call Logs</span>
            </div>
            <div class="nav-item" data-view="callcenter-analytics">
                <i class="fas fa-chart-line"></i>
                <span>Analytics</span>
            </div>
            <div class="nav-section-title">SYSTEM</div>
            <div class="nav-item" data-view="settings">
                <i class="fas fa-cog"></i>
                <span>Settings</span>
            </div>
            <div class="nav-divider"></div>
            <div class="nav-item" id="logoutBtn" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i>
                <span>Exit Admin</span>
            </div>
        </div>
    </div>

    <div class="main-content" id="mainContent" style="display: none;"></div>

    <div class="notification" id="notification">Action completed successfully</div>
    <div class="global-loading-overlay" id="globalLoadingOverlay">
        <div class="global-loading-spinner"></div>
        <div class="global-loading-text">Loading...</div>
    </div>

    <!-- Add Client Modal -->
    <div class="modal" id="addClientModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal('addClientModal')">&times;</span>
            <h2>Add New Client</h2>
            <form id="addClientForm">
                <div class="form-group">
                    <label>Phone Number *</label>
                    <input type="text" id="clientPhone" required placeholder="08012345678">
                </div>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="clientFullName" placeholder="John Doe">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Country</label>
                        <input type="text" id="clientCountry" placeholder="Nigeria">
                    </div>
                    <div class="form-group">
                        <label>State</label>
                        <input type="text" id="clientState" placeholder="Lagos">
                    </div>
                </div>
                <div class="form-group">
                    <label>City</label>
                    <input type="text" id="clientCity" placeholder="Ikeja">
                </div>
                <div class="form-group">
                    <label>Date of Birth</label>
                    <input type="date" id="clientDOB">
                </div>
                <div class="form-group">
                    <label>Call Script</label>
                    <textarea id="clientCallScript" rows="4" placeholder="Enter call script..."></textarea>
                </div>
                <div class="modal-buttons">
                    <button type="submit" class="btn-primary">Add Client</button>
                    <button type="button" class="btn-secondary" onclick="closeModal('addClientModal')">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const APPS_SCRIPT_URL = '%%APPS_SCRIPT_URL%%';
        
        let currentView = 'dashboard';
        let movies = [];
        let callCenterWorkers = [];
        let callCenterClients = [];
        let callCenterCalls = [];

        function showNotification(msg, type = 'success') {
            const notif = document.getElementById('notification');
            notif.textContent = msg;
            notif.className = 'notification ' + type;
            notif.classList.add('show');
            setTimeout(() => notif.classList.remove('show'), 3000);
        }

        function showLoading(show, message = 'Loading...') {
            const overlay = document.getElementById('globalLoadingOverlay');
            if (show) {
                overlay.querySelector('.global-loading-text').textContent = message;
                overlay.classList.add('active');
            } else {
                overlay.classList.remove('active');
            }
        }

        async function apiCall(action, data = {}, method = 'GET') {
            try {
                let url = `/api/proxy?action=${action}&t=${Date.now()}`;
                if (method === 'GET') {
                    Object.keys(data).forEach(key => url += `&${key}=${encodeURIComponent(data[key])}`);
                }
                const options = { method, headers: { 'Content-Type': 'application/json' } };
                if (method === 'POST') options.body = JSON.stringify(data);
                const response = await fetch(url, options);
                return await response.json();
            } catch (error) {
                return { success: false, error: error.message };
            }
        }

        async function fetchMovies() {
            const result = await apiCall('getMovies');
            if (result.success) movies = result.movies || [];
            return movies;
        }

        async function fetchCallCenterWorkers() {
            const result = await apiCall('getCallCenterAllWorkers');
            if (result.success) callCenterWorkers = result.workers || [];
            return callCenterWorkers;
        }

        async function fetchCallCenterClients() {
            const result = await apiCall('getCallCenterAllClients');
            if (result.success) callCenterClients = result.clients || [];
            return callCenterClients;
        }

        async function fetchCallCenterCalls() {
            const result = await apiCall('getCallCenterAllCalls');
            if (result.success) callCenterCalls = result.calls || [];
            return callCenterCalls;
        }

        async function approveWorker(email) {
            showLoading(true, 'Approving worker...');
            const result = await apiCall('approveCallCenterWorker', { email }, 'POST');
            showLoading(false);
            if (result.success) {
                showNotification('Worker approved successfully');
                await renderView(currentView);
            } else {
                showNotification(result.error || 'Failed to approve', 'error');
            }
        }

        async function deleteWorker(email) {
            if (!confirm('Are you sure you want to delete this worker?')) return;
            showLoading(true, 'Deleting worker...');
            const result = await apiCall('deleteCallCenterWorker', { email }, 'POST');
            showLoading(false);
            if (result.success) {
                showNotification('Worker deleted successfully');
                await renderView(currentView);
            } else {
                showNotification(result.error || 'Failed to delete', 'error');
            }
        }

        async function addClient(clientData) {
            showLoading(true, 'Adding client...');
            const result = await apiCall('addCallCenterClient', clientData, 'POST');
            showLoading(false);
            if (result.success) {
                showNotification('Client added successfully');
                closeModal('addClientModal');
                await renderView(currentView);
            } else {
                showNotification(result.error || 'Failed to add client', 'error');
            }
        }

        async function deleteClient(phoneNumber) {
            if (!confirm('Are you sure you want to delete this client?')) return;
            showLoading(true, 'Deleting client...');
            const result = await apiCall('deleteCallCenterClient', { phoneNumber }, 'POST');
            showLoading(false);
            if (result.success) {
                showNotification('Client deleted successfully');
                await renderView(currentView);
            } else {
                showNotification(result.error || 'Failed to delete', 'error');
            }
        }

        function openAddClientModal() {
            document.getElementById('addClientForm').reset();
            document.getElementById('addClientModal').classList.add('active');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        document.getElementById('addClientForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const clientData = {
                phoneNumber: document.getElementById('clientPhone').value,
                fullName: document.getElementById('clientFullName').value,
                country: document.getElementById('clientCountry').value,
                state: document.getElementById('clientState').value,
                city: document.getElementById('clientCity').value,
                dateOfBirth: document.getElementById('clientDOB').value,
                callScript: document.getElementById('clientCallScript').value
            };
            await addClient(clientData);
        });

        function renderCallCenterWorkers() {
            const pendingWorkers = callCenterWorkers.filter(w => w.status === 'Pending');
            const activeWorkers = callCenterWorkers.filter(w => w.status === 'Active');
            
            return `
                <div class="top-bar">
                    <div class="page-title">
                        <h1>Call Center Workers</h1>
                        <p>Manage worker registrations and approvals</p>
                    </div>
                    <div class="admin-profile">
                        <div class="admin-info"><h4>Admin</h4><p>Administrator</p></div>
                        <div class="admin-avatar">AD</div>
                    </div>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-user-plus"></i></div>
                        <div class="stat-value">${pendingWorkers.length}</div>
                        <div class="stat-label">Pending Approvals</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-users"></i></div>
                        <div class="stat-value">${activeWorkers.length}</div>
                        <div class="stat-label">Active Workers</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-phone-alt"></i></div>
                        <div class="stat-value">${callCenterWorkers.reduce((sum, w) => sum + (w.totalCalls || 0), 0)}</div>
                        <div class="stat-label">Total Calls Made</div>
                    </div>
                </div>
                
                <div class="section-header"><h2>Pending Approvals</h2></div>
                <div class="table-container">
                    <table>
                        <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Country</th><th>Registered</th><th>Actions</th></tr></thead>
                        <tbody>${pendingWorkers.map(w => `
                            <tr>
                                <td>${w.fullName || 'N/A'}</td>
                                <td>${w.email}</td>
                                <td>${w.phoneNumber || 'N/A'}</td>
                                <td>${w.country || 'N/A'}</td>
                                <td>${w.registrationDate ? new Date(w.registrationDate).toLocaleDateString() : 'N/A'}</td>
                                <td>
                                    <div class="action-btns">
                                        <button class="action-btn success" onclick="approveWorker('${w.email}')" title="Approve"><i class="fas fa-check"></i></button>
                                        <button class="action-btn delete" onclick="deleteWorker('${w.email}')" title="Delete"><i class="fas fa-trash"></i></button>
                                    </div>
                                </td>
                            </tr>
                        `).join('')}</tbody>
                        ${pendingWorkers.length === 0 ? '<tr><td colspan="6" style="text-align:center">No pending approvals</td></tr>' : ''}
                    </table>
                </div>
                
                <div class="section-header"><h2>Active Workers</h2></div>
                <div class="table-container">
                    <table>
                        <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Country</th><th>Total Calls</th><th>Last Active</th><th>Actions</th></tr></thead>
                        <tbody>${activeWorkers.map(w => `
                            <tr>
                                <td>${w.fullName || 'N/A'}</td>
                                <td>${w.email}</td>
                                <td>${w.phoneNumber || 'N/A'}</td>
                                <td>${w.country || 'N/A'}</td>
                                <td>${w.totalCalls || 0}</td>
                                <td>${w.lastActive ? new Date(w.lastActive).toLocaleDateString() : 'Never'}</td>
                                <td>
                                    <div class="action-btns">
                                        <button class="action-btn delete" onclick="deleteWorker('${w.email}')" title="Delete"><i class="fas fa-trash"></i></button>
                                    </div>
                                </td>
                            </tr>
                        `).join('')}</tbody>
                    </table>
                </div>
            `;
        }

        function renderCallCenterClients() {
            return `
                <div class="top-bar">
                    <div class="page-title">
                        <h1>Call Center Clients</h1>
                        <p>Manage client database</p>
                    </div>
                    <div class="admin-profile">
                        <div class="admin-info"><h4>Admin</h4><p>Administrator</p></div>
                        <div class="admin-avatar">AD</div>
                    </div>
                </div>
                
                <div class="section-header">
                    <h2>All Clients (${callCenterClients.length})</h2>
                    <button class="btn-primary" onclick="openAddClientModal()"><i class="fas fa-plus"></i> Add Client</button>
                </div>
                
                <div class="table-container">
                    <table>
                        <thead><tr><th>Phone</th><th>Name</th><th>Country</th><th>State</th><th>City</th><th>Total Calls</th><th>Last Called</th><th>Status</th><th>Actions</th></tr></thead>
                        <tbody>${callCenterClients.map(c => `
                            <tr>
                                <td>${c.phoneNumber}</td>
                                <td>${c.fullName || 'Unknown'}</td>
                                <td>${c.country || 'N/A'}</td>
                                <td>${c.state || 'N/A'}</td>
                                <td>${c.city || 'N/A'}</td>
                                <td>${c.totalCalls || 0}</td>
                                <td>${c.lastCalled ? new Date(c.lastCalled).toLocaleDateString() : 'Never'}</td>
                                <td><span class="status-badge ${c.callStatus === 'Pending' ? 'pending' : 'active'}">${c.callStatus || 'Pending'}</span></td>
                                <td>
                                    <div class="action-btns">
                                        <button class="action-btn delete" onclick="deleteClient('${c.phoneNumber}')" title="Delete"><i class="fas fa-trash"></i></button>
                                    </div>
                                </td>
                            </tr>
                        `).join('')}</tbody>
                        ${callCenterClients.length === 0 ? '<tr><td colspan="9" style="text-align:center">No clients found</td></tr>' : ''}
                    </table>
                </div>
            `;
        }

        function renderCallCenterCalls() {
            const recentCalls = [...callCenterCalls].sort((a,b) => new Date(b.callDate) - new Date(a.callDate)).slice(0, 50);
            const outcomeCounts = { Connected: 0, Missed: 0, 'Hanged Up': 0, Voicemail: 0 };
            recentCalls.forEach(c => { if (outcomeCounts[c.outcome] !== undefined) outcomeCounts[c.outcome]++; });
            
            return `
                <div class="top-bar">
                    <div class="page-title">
                        <h1>Call Logs</h1>
                        <p>View all call history</p>
                    </div>
                    <div class="admin-profile">
                        <div class="admin-info"><h4>Admin</h4><p>Administrator</p></div>
                        <div class="admin-avatar">AD</div>
                    </div>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-phone"></i></div><div class="stat-value">${callCenterCalls.length}</div><div class="stat-label">Total Calls</div></div>
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-check-circle"></i></div><div class="stat-value">${outcomeCounts.Connected}</div><div class="stat-label">Connected</div></div>
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-phone-slash"></i></div><div class="stat-value">${outcomeCounts.Missed}</div><div class="stat-label">Missed</div></div>
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-clock"></i></div><div class="stat-value">${Math.round(recentCalls.reduce((sum, c) => sum + (c.duration || 0), 0) / 60)}min</div><div class="stat-label">Total Talk Time</div></div>
                </div>
                
                <div class="table-container">
                    <table>
                        <thead><tr><th>Date & Time</th><th>Worker</th><th>Client</th><th>Phone</th><th>Duration</th><th>Outcome</th><th>Remarks</th> </thead>
                        <tbody>${recentCalls.map(c => `
                            <tr>
                                <td>${new Date(c.callDate).toLocaleString()}</td>
                                <td>${c.workerEmail?.split('@')[0] || 'Unknown'}</td>
                                <td>${c.clientName || 'Unknown'}</td>
                                <td>${c.clientPhone}</td>
                                <td>${Math.floor(c.duration / 60)}:${(c.duration % 60).toString().padStart(2,'0')}</td>
                                <td><span class="status-badge ${c.outcome === 'Connected' ? 'active' : 'pending'}">${c.outcome}</span></td>
                                <td>${c.remarks?.substring(0, 50) || ''}${c.remarks?.length > 50 ? '...' : ''}</td>
                             </tr>
                        `).join('')}</tbody>
                        ${recentCalls.length === 0 ? '<tr><td colspan="7" style="text-align:center">No calls recorded</td></tr>' : ''}
                    </table>
                </div>
            `;
        }

        function renderCallCenterAnalytics() {
            const outcomeCounts = { Connected: 0, Missed: 0, 'Hanged Up': 0, Voicemail: 0 };
            callCenterCalls.forEach(c => { if (outcomeCounts[c.outcome] !== undefined) outcomeCounts[c.outcome]++; });
            
            const workerStats = {};
            callCenterCalls.forEach(c => {
                if (!workerStats[c.workerEmail]) workerStats[c.workerEmail] = { name: c.workerEmail?.split('@')[0] || c.workerEmail, calls: 0, duration: 0 };
                workerStats[c.workerEmail].calls++;
                workerStats[c.workerEmail].duration += c.duration || 0;
            });
            const topWorkers = Object.values(workerStats).sort((a,b) => b.calls - a.calls).slice(0, 5);
            
            return `
                <div class="top-bar">
                    <div class="page-title">
                        <h1>Call Analytics</h1>
                        <p>Performance metrics and insights</p>
                    </div>
                    <div class="admin-profile">
                        <div class="admin-info"><h4>Admin</h4><p>Administrator</p></div>
                        <div class="admin-avatar">AD</div>
                    </div>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-chart-line"></i></div><div class="stat-value">${callCenterCalls.length}</div><div class="stat-label">Total Calls</div></div>
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-percent"></i></div><div class="stat-value">${callCenterCalls.length ? Math.round((outcomeCounts.Connected / callCenterCalls.length) * 100) : 0}%</div><div class="stat-label">Connect Rate</div></div>
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-clock"></i></div><div class="stat-value">${Math.round(callCenterCalls.reduce((sum, c) => sum + (c.duration || 0), 0) / 60)}min</div><div class="stat-label">Total Talk Time</div></div>
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-user-tie"></i></div><div class="stat-value">${Object.keys(workerStats).length}</div><div class="stat-label">Active Workers</div></div>
                </div>
                
                <div class="charts-row">
                    <div class="chart-card"><div class="chart-header"><h3>Call Outcomes</h3></div><div class="chart-container"><canvas id="outcomeChart"></canvas></div></div>
                    <div class="chart-card"><div class="chart-header"><h3>Top Performers</h3></div><div class="table-container" style="margin:0"><table><thead><tr><th>Worker</th><th>Calls</th><th>Talk Time</th></tr></thead><tbody>${topWorkers.map(w => `<tr><td>${w.name}</td><td>${w.calls}</td><td>${Math.floor(w.duration / 60)}min</td></tr>`).join('')}</tbody></table></div></div>
                </div>
            `;
        }

        async function renderView(view) {
            currentView = view;
            showLoading(true);
            
            await Promise.all([fetchMovies(), fetchCallCenterWorkers(), fetchCallCenterClients(), fetchCallCenterCalls()]);
            
            let html = '';
            switch(view) {
                case 'dashboard': html = renderDashboard(); break;
                case 'movies': html = renderMovies(); break;
                case 'series': html = renderSeries(); break;
                case 'callcenter-workers': html = renderCallCenterWorkers(); break;
                case 'callcenter-clients': html = renderCallCenterClients(); break;
                case 'callcenter-calls': html = renderCallCenterCalls(); break;
                case 'callcenter-analytics': html = renderCallCenterAnalytics(); break;
                default: html = renderDashboard();
            }
            
            document.getElementById('mainContent').innerHTML = html;
            
            if (view === 'callcenter-analytics') {
                setTimeout(() => {
                    const ctx = document.getElementById('outcomeChart')?.getContext('2d');
                    if (ctx) {
                        new Chart(ctx, {
                            type: 'doughnut',
                            data: { labels: ['Connected', 'Missed', 'Hanged Up', 'Voicemail'], datasets: [{ data: [outcomeCounts.Connected, outcomeCounts.Missed, outcomeCounts['Hanged Up'], outcomeCounts.Voicemail], backgroundColor: ['#10b981', '#f59e0b', '#ef4444', '#3b82f6'] }] },
                            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#fff' } } } }
                        });
                    }
                }, 100);
            }
            
            showLoading(false);
        }

        function renderDashboard() {
            const pendingWorkers = callCenterWorkers.filter(w => w.status === 'Pending').length;
            const totalCalls = callCenterCalls.length;
            const recentMovies = movies.slice(0, 5);
            
            return `
                <div class="top-bar"><div class="page-title"><h1>Dashboard</h1><p>Welcome back, Admin</p></div><div class="admin-profile"><div class="admin-info"><h4>Admin</h4><p>Administrator</p></div><div class="admin-avatar">AD</div></div></div>
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-film"></i></div><div class="stat-value">${movies.length}</div><div class="stat-label">Total Movies</div></div>
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-phone-alt"></i></div><div class="stat-value">${totalCalls}</div><div class="stat-label">Total Calls</div></div>
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-user-clock"></i></div><div class="stat-value">${pendingWorkers}</div><div class="stat-label">Pending Workers</div></div>
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-users"></i></div><div class="stat-value">${callCenterWorkers.length}</div><div class="stat-label">Total Workers</div></div>
                </div>
                <div class="section-header"><h2>Recent Movies</h2><button class="btn-primary" onclick="document.querySelector('[data-view=\"movies\"]').click()"><i class="fas fa-plus"></i> View All</button></div>
                <div class="table-container"><table><thead><tr><th>Title</th><th>Category</th><th>Year</th></tr></thead><tbody>${recentMovies.map(m => `<tr><td>${m.title}</td><td>${m.category}</td><td>${m.year}</td></tr>`).join('')}</tbody></table></div>
            `;
        }

        function renderMovies() {
            return `<div class="top-bar"><div class="page-title"><h1>Movies</h1><p>Manage your movie catalog</p></div><div class="admin-profile"><div class="admin-info"><h4>Admin</h4><p>Administrator</p></div><div class="admin-avatar">AD</div></div></div>
            <div class="section-header"><h2>All Movies (${movies.length})</h2><button class="btn-primary"><i class="fas fa-plus"></i> Add Movie</button></div>
            <div class="table-container"><table><thead><tr><th>Title</th><th>Category</th><th>Genre</th><th>Year</th></tr></thead><tbody>${movies.map(m => `<tr><td>${m.title}</td><td>${m.category}</td><td>${m.genre}</td><td>${m.year}</td></tr>`).join('')}</tbody></table></div>`;
        }

        function renderSeries() {
            const series = movies.filter(m => m.type === 'series');
            return `<div class="top-bar"><div class="page-title"><h1>Series</h1><p>Manage your TV series</p></div><div class="admin-profile"><div class="admin-info"><h4>Admin</h4><p>Administrator</p></div><div class="admin-avatar">AD</div></div></div>
            <div class="section-header"><h2>All Series (${series.length})</h2><button class="btn-primary"><i class="fas fa-plus"></i> Add Series</button></div>
            <div class="table-container"><table><thead><tr><th>Title</th><th>Category</th><th>Year</th><th>Seasons</th></tr></thead><tbody>${series.map(s => `<tr><td>${s.title}</td><td>${s.category}</td><td>${s.year}</td><td>${s.seasons || 1}</td></tr>`).join('')}</tbody></table></div>`;
        }

        function enterDashboard() {
            document.getElementById('enterContainer').style.display = 'none';
            document.getElementById('sidebar').style.display = 'block';
            document.getElementById('mainContent').style.display = 'block';
            renderView('dashboard');
        }

        function logout() {
            document.getElementById('enterContainer').style.display = 'flex';
            document.getElementById('sidebar').style.display = 'none';
            document.getElementById('mainContent').style.display = 'none';
        }

        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                const view = item.dataset.view;
                if (view) {
                    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                    item.classList.add('active');
                    renderView(view);
                }
            });
        });

        window.approveWorker = approveWorker;
        window.deleteWorker = deleteWorker;
        window.deleteClient = deleteClient;
        window.openAddClientModal = openAddClientModal;
        window.closeModal = closeModal;
        
        console.log('Admin panel ready');
    </script>
</body>
</html>
